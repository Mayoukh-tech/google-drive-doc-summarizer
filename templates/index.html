<!DOCTYPE html>
<html>
<head>
<title>Drive Document Summaries</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
padding:40px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border-bottom:1px solid #ddd;
}

th{
background:#2c3e50;
color:white;
}

a{
color:#3498db;
text-decoration:none;
}

button{
padding:10px 18px;
margin:10px 5px;
background:#27ae60;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1e8449;
}

</style>
</head>

<body>

<h2>Google Drive Document Summaries</h2>

<a href="/download_csv"><button>Download CSV</button></a>
<a href="/download_pdf"><button>Download PDF</button></a>

<table>

<tr>
<th>File Name</th>
<th>Summary</th>
<th>Open File</th>
</tr>

{% for file in files %}

<tr>

<td>{{file.name}}</td>

<td>{{file.summary}}</td>

<td>
<a href="{{file.link}}" target="_blank">Open</a>
</td>

</tr>

{% endfor %}

</table>

</body>
</html>
